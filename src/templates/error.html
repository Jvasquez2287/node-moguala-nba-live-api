<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Error</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      padding: 20px; 
    }
    .container { 
      background: white; 
      border-radius: 12px; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
      padding: 40px; 
      max-width: 500px; 
      width: 100%; 
      text-align: center; 
    }
    .error-icon { 
      font-size: 48px; 
      margin-bottom: 15px; 
    }
    h1 { 
      color: #f44336; 
      margin-bottom: 15px; 
      font-size: 28px; 
    }
    p { 
      color: #666; 
      line-height: 1.6; 
      margin-bottom: 25px; 
    }
    .error-code { 
      background: #ffebee; 
      color: #c62828; 
      padding: 12px 20px; 
      border-radius: 8px; 
      font-family: monospace; 
      font-size: 13px; 
      margin: 20px 0; 
      word-break: break-all; 
      max-height: 100px; 
      overflow-y: auto; 
      text-align: left; 
    }
    .actions { 
      display: flex; 
      gap: 10px; 
      margin-top: 30px; 
      justify-content: center; 
      flex-wrap: wrap; 
    }
    button { 
      padding: 12px 30px; 
      border: none; 
      border-radius: 8px; 
      font-size: 16px; 
      cursor: pointer; 
      transition: background 0.3s; 
      font-weight: 600; 
    }
    .btn-close { 
      background: #f0f0f0; 
      color: #333; 
    }
    .btn-close:hover { 
      background: #e0e0e0; 
    }
    .btn-home { 
      background: #667eea; 
      color: white; 
    }
    .btn-home:hover { 
      background: #5568d3; 
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-icon">❌</div>
    <h1>Oops! Something Went Wrong</h1>
    <p>We encountered an error processing your subscription.</p>
    <div class="error-code">{{ERROR_MESSAGE}}</div>
    <div class="actions">
      <button class="btn-home" onclick="window.location.href = '/'">Go to Home</button>
      <button class="btn-close" onclick="window.close()">Close</button>
    </div>
  </div>
</body>
</html>
