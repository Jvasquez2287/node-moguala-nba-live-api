<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invalid Request</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Roboto, sans-serif; 
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      padding: 20px; 
    }
    .container { 
      background: white; 
      border-radius: 16px; 
      box-shadow: 0 25px 70px rgba(0,0,0,0.3); 
      padding: 50px 40px; 
      max-width: 500px; 
      width: 100%; 
      animation: slideUp 0.5s ease-out; 
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo {
      max-width: 80px;
      height: auto;
      margin: 0 auto;
    }
    .error-icon { 
      font-size: 56px; 
      margin-bottom: 15px;
      display: inline-block;
      background: #E8EEF6;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      margin-right: auto;
    }
    h1 { 
      color: #5B6B7F; 
      margin-bottom: 15px; 
      font-size: 32px; 
      font-weight: 700;
      text-align: center;
    }
    p { 
      color: #6b7280; 
      line-height: 1.6; 
      margin-bottom: 25px; 
      text-align: center;
    }
    .error-code { 
      background: #D0D9E8; 
      color: #2B3E50; 
      padding: 12px 20px; 
      border-radius: 8px; 
      font-family: 'Courier New', monospace; 
      font-size: 14px; 
      margin: 20px 0; 
      word-break: break-all;
      border-left: 4px solid #5B6B7F;
    }
    button { 
      background: #5B6B7F; 
      color: white; 
      border: none; 
      padding: 14px 30px; 
      border-radius: 10px; 
      font-size: 16px; 
      cursor: pointer; 
      transition: all 0.3s ease; 
      font-weight: 600; 
    }
    button:hover { 
      background: #3A4A5F; 
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(91, 107, 127, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="/api/v1/test/convert" alt="NBA Tracker Logo" class="logo" onerror="this.style.display='none'">
    </div>
    <div class="error-icon">⚠️</div>
    <h1>Invalid Request</h1>
    <p>Session ID is required to process your checkout.</p>
    <div class="error-code">Missing: session_id parameter</div>
    <button onclick="window.close()">Close</button>
  </div>
</body>
</html>
