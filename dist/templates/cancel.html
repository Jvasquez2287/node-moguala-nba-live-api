<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Canceled</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Roboto, sans-serif; 
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      padding: 20px; 
    }
    .container { 
      background: white; 
      border-radius: 16px; 
      box-shadow: 0 25px 70px rgba(0,0,0,0.3); 
      padding: 50px 40px; 
      max-width: 500px; 
      width: 100%; 
      animation: slideUp 0.5s ease-out; 
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo-container {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo {
      max-width: 80px;
      height: auto;
      margin: 0 auto;
    }
    .cancel-icon { 
      font-size: 56px; 
      margin-bottom: 15px;
      display: inline-block;
      background: #E8EEF6;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      margin-right: auto;
    }
    h1 { 
      color: #001F3F; 
      font-size: 32px; 
      margin-bottom: 8px; 
      font-weight: 700;
      text-align: center;
    }
    .subtitle { 
      color: #6b7280; 
      font-size: 16px; 
      line-height: 1.6; 
      margin-bottom: 20px; 
      text-align: center;
    }
    .message-box { 
      background: #E8EEF6; 
      border-left: 4px solid #001F3F; 
      padding: 15px 20px; 
      border-radius: 8px; 
      margin: 20px 0; 
      text-align: left; 
    }
    .message-box p { 
      color: #003366; 
      font-size: 14px; 
      line-height: 1.6; 
      font-weight: 600;
    }
    .message-box li { 
      margin-left: 20px; 
      color: #003366; 
      font-size: 14px; 
      margin-bottom: 8px; 
    }
    .actions { 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
      margin-top: 30px; 
    }
    button { 
      padding: 14px 20px; 
      border: none; 
      border-radius: 10px; 
      font-size: 16px; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.3s ease; 
    }
    .btn-retry { 
      background: #001F3F; 
      color: white; 
    }
    .btn-retry:hover { 
      background: #000D1A; 
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 31, 63, 0.2);
    }
    .btn-close { 
      background: #f3f4f6; 
      color: #374151; 
    }
    .btn-close:hover { 
      background: #e5e7eb; 
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="/api/v1/test/convert" alt="NBA Tracker Logo" class="logo" onerror="this.style.display='none'">
    </div>
    <div class="cancel-icon">⏸️</div>
    <h1>Checkout Canceled</h1>
    <p class="subtitle">You've canceled the checkout process.</p>

    <div class="message-box">
      <p><strong>What happens next?</strong></p>
      <ul>
        <li>Your payment was not processed</li>
        <li>No charges have been made to your account</li>
        <li>You can try again whenever you're ready</li>
      </ul>
    </div>

    <div class="actions">
      <button class="btn-retry" onclick="window.location.href = '/api/v1/subscriptions/stripe/product'">Retry Subscription</button>
      <button class="btn-close" onclick="window.close()">Close</button>
    </div>
  </div>
</body>
</html>
